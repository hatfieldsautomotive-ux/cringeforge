<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | CringeForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0f; color: #fafaf9; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .gradient-text { background: linear-gradient(135deg, #a78bfa 0%, #f472b6 50%, #fb7185 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <a href="/" class="font-display text-3xl font-bold">CringeForge</a>
      <p class="text-stone-400 mt-2">Start generating cringe today.</p>
    </div>
    
    <div class="bg-stone-900/50 border border-stone-800 rounded-2xl p-8">
      <form id="signupForm">
        <div class="mb-4">
          <label class="block text-sm font-semibold text-stone-300 mb-2">Email</label>
          <input type="email" id="email" required
                 class="w-full px-4 py-3 bg-stone-900 border border-stone-700 rounded-lg text-white focus:border-violet-500 focus:outline-none"
                 placeholder="you@company.com">
        </div>
        
        <div class="mb-6">
          <label class="block text-sm font-semibold text-stone-300 mb-2">Password</label>
          <input type="password" id="password" required minlength="6"
                 class="w-full px-4 py-3 bg-stone-900 border border-stone-700 rounded-lg text-white focus:border-violet-500 focus:outline-none"
                 placeholder="••••••••">
          <p class="text-xs text-stone-500 mt-1">Minimum 6 characters</p>
        </div>
        
        <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-violet-500 to-pink-500 hover:from-violet-400 hover:to-pink-400 text-white font-bold py-3 rounded-lg transition-all">
          Create Free Account
        </button>
      </form>
      
      <div id="success" class="mt-4 p-3 bg-green-500/10 border border-green-500/30 rounded-lg text-green-400 text-sm hidden"></div>
      
      <div id="error" class="mt-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm hidden"></div>
      
      <p class="mt-6 text-center text-stone-400 text-sm">
        Already have an account? <a href="/login" class="text-violet-400 hover:underline">Sign in</a>
      </p>
      
      <p class="mt-4 text-center text-stone-500 text-xs">
        <a href="/" class="hover:text-stone-400">← Back to home</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      error.classList.add('hidden');
      success.classList.add('hidden');
      
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Signup failed');
        
        success.textContent = 'Check your email to confirm your account! Then you can sign in.';
        success.classList.remove('hidden');
        document.getElementById('signupForm').reset();
        
      } catch (err) {
        error.textContent = err.message;
        error.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Create Free Account';
      }
    });
  </script>
</body>
</html>
